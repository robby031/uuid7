name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: libuuid7.so
            cmake_extra: ""
          - os: macos-latest
            artifact: libuuid7.dylib
            cmake_extra: ""
          - os: windows-latest
            artifact: uuid7.dll
            cmake_extra: "-A x64"

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build shared library
        run: cmake --build build --config Release --target uuid7_shared

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-shared
          path: build/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded artifacts
        run: ls -R artifacts

      - name: Rename artifacts untuk konsistensi
        run: |
          mkdir dist
          cp artifacts/ubuntu-latest-shared/libuuid7.so dist/libuuid7-linux-x86_64.so
          cp artifacts/macos-latest-shared/libuuid7.dylib dist/libuuid7-macos-x86_64.dylib
          cp artifacts/windows-latest-shared/Release/uuid7.dll dist/uuid7-windows-x64.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## UUID v7 Library ${{ github.ref_name }}

            Library C untuk UUID v7 yang monoton naik.

            ### File
            - `libuuid7-linux-x86_64.so`
            - `libuuid7-macos-x86_64.dylib`
            - `uuid7-windows-x64.dll`

            ### Cara Install
            Lihat [README](https://github.com/${{ github.repository }}#readme) untuk instruksi.
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}